# BioSherpa Agent Registry
# Add new agents here -- no code changes needed in mcp_server.py
entries:
  - id: transcriptome
    name: Transcriptome Analysis Engineer
    description: >
      Transcriptome analysis engineer specializing in bulk RNA-seq and microarray
      differential expression. Uses the unified diffexp pipeline (DESeq2 for counts,
      limma for normalized/microarray data).
    keywords:
      - rna-seq
      - rnaseq
      - transcriptome
      - deseq2
      - limma
      - differential expression
      - deg
      - volcano
      - pca
      - ma plot
      - gene expression
      - bulk rna
      - microarray
      - count matrix
    skills:
      - diffexp
    version: 0.1.0

  - id: enrichment
    name: Enrichment Analysis Engineer
    description: >
      Functional enrichment analysis engineer. Takes DEG lists and performs
      GO (BP/MF/CC) and KEGG pathway enrichment.
    keywords:
      - go
      - kegg
      - enrichment
      - pathway
      - gene ontology
      - clusterprofiler
      - functional annotation
      - gsea
    skills:
      - go
      - kegg
    version: 0.1.0

  - id: pubmed
    name: PubMed Literature Engineer
    description: >
      Literature search specialist. Searches PubMed for articles related to
      genes, pathways, or keywords.
    keywords:
      - pubmed
      - literature
      - articles
      - ncbi
      - reference
      - citation
      - paper
      - journal
    skills:
      - pubmed
    version: 0.1.0


  - id: report
    name: Analysis Report Engineer
    description: >
      Generates combined HTML analysis reports after all bioinformatics
      analyses are complete. Waits for user confirmation before generating.
    keywords:
      - report
      - html
      - summary
      - documentation
    skills:
      - report
    version: 0.1.0

  - id: codegen
    name: Code Generation Engineer
    description: >
      Generates master reproducible R scripts by combining code fragments
      from diffexp, enrichment, and PubMed analyses into a single runnable script.
    keywords:
      - codegen
      - reproducible
      - master script
      - delivery
    skills:
      - codegen
    version: 0.1.0
metadata:
  updated: "2026-07-13"
  version: "0.1.0"