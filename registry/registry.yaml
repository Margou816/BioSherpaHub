# BioSherpa Agent Registry
# Add new agents here -- no code changes needed in mcp_server.py
entries:
  - id: transcriptome
    name: Transcriptome Analysis Engineer
    description: >
      Transcriptome analysis engineer specializing in bulk RNA-seq and microarray
      differential expression. Guides users through experimental design questions,
      identifies the right statistical method (DESeq2 for count data, limma for
      microarrays), and ensures reproducible analysis.
    keywords:
      - rna-seq
      - rnaseq
      - transcriptome
      - deseq2
      - limma
      - differential expression
      - deg
      - volcano
      - pca
      - ma plot
      - gene expression
      - bulk rna
      - microarray
      - count matrix
    skills:
      - deseq2
      - limma
    version: 0.1.0

  - id: enrichment
    name: Enrichment Analysis Engineer
    description: >
      Functional enrichment analysis engineer. Takes DEG lists and performs
      GO (BP/MF/CC) and KEGG pathway enrichment. Helps users choose the right
      organism database, interpret p/q values, and understand pathway results.
    keywords:
      - go
      - kegg
      - enrichment
      - pathway
      - gene ontology
      - clusterprofiler
      - functional annotation
      - gsea
    skills:
      - go
      - kegg
    version: 0.1.0

  - id: pubmed
    name: PubMed Literature Engineer
    description: >
      Literature search specialist. Searches PubMed for articles related to
      genes, pathways, or keywords. Helps users construct effective NCBI queries
      and interpret search results.
    keywords:
      - pubmed
      - literature
      - articles
      - ncbi
      - reference
      - citation
      - paper
      - journal
    skills:
      - pubmed
    version: 0.1.0

